services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

  stage-0:
    build: ./backend/stage-0
    restart: unless-stopped
    environment:
      - PORT=8059
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stage-0.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/backend/stage-0`)"
      - "traefik.http.routers.stage-0.entrypoints=websecure"
      - "traefik.http.routers.stage-0.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.stage-0-strip.stripprefix.prefixes=/backend/stage-0"
      - "traefik.http.routers.stage-0.middlewares=stage-0-strip"
      - "traefik.http.services.stage-0.loadbalancer.server.port=8080"

networks:
  proxy:
    external: false

volumes:
  letsencrypt: