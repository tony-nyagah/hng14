services:
  traefik:
    image: traefik:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/traefik/traefik.yml:/traefik.yml:ro
      - /root/traefik/acme.json:/letsencrypt/acme.json
    networks:
      - proxy

  backend-stage-0:
    container_name: genderize
    build: ./backend/stage-0
    restart: unless-stopped
    environment:
      - PORT=8059
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stage-0.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/backend/stage-0`)"
      - "traefik.http.routers.stage-0.entrypoints=websecure"
      - "traefik.http.routers.stage-0.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.stage-0-strip.stripprefix.prefixes=/backend/stage-0"
      - "traefik.http.routers.stage-0.middlewares=stage-0-strip"
      - "traefik.http.services.stage-0.loadbalancer.server.port=8059"
    
  frontend-stage-0:
    container_name: task-card
    build: ./frontend/stage-0/task-card
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-stage-0.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/frontend/stage-0`)"
      - "traefik.http.routers.frontend-stage-0.entrypoints=websecure"
      - "traefik.http.routers.frontend-stage-0.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.frontend-stage-0-strip.stripprefix.prefixes=/frontend/stage-0"
      - "traefik.http.routers.frontend-stage-0.middlewares=frontend-stage-0-strip"
      - "traefik.http.services.frontend-stage-0.loadbalancer.server.port=4173"

networks:
  proxy:
    external: false