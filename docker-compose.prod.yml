services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/traefik/traefik.yml:/traefik.yml:ro
      - /root/traefik/acme.json:/letsencrypt/acme.json
    networks:
      - web

  backend-stage-0:
    build: ./backend/stage-0
    restart: unless-stopped
    environment:
      - PORT=8059
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stage-0.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/api/classify`)"
      - "traefik.http.routers.stage-0.entrypoints=websecure"
      - "traefik.http.routers.stage-0.tls.certresolver=letsencrypt"
      - "traefik.http.services.stage-0.loadbalancer.server.port=8059"

  backend-stage-2:
    build: ./backend/stage-2
    restart: unless-stopped
    environment:
      - PORT=8070
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stage-2.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/api/profiles`)"
      - "traefik.http.routers.stage-2.entrypoints=websecure"
      - "traefik.http.routers.stage-2.tls.certresolver=letsencrypt"
      - "traefik.http.services.stage-2.loadbalancer.server.port=8070"

  # ── Stage 3: Secure backend API ───────────────────────────────────────────────
  insighta-backend:
    build: ./backend/stage-3
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/data/insighta.db
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - insighta-db:/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.insighta-api.rule=Host(`api.insighta.app`)"
      - "traefik.http.routers.insighta-api.entrypoints=websecure"
      - "traefik.http.routers.insighta-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.insighta-api.loadbalancer.server.port=8080"

  # ── Stage 3: Web portal ───────────────────────────────────────────────────────
  insighta-web:
    build: ./web/stage-3
    restart: unless-stopped
    environment:
      - WEB_PORT=3000
      - ENV=production
      - INSIGHTA_API_URL=http://insighta-backend:8080
      - SESSION_HASH_KEY=${SESSION_HASH_KEY}
      - SESSION_BLOCK_KEY=${SESSION_BLOCK_KEY}
      - CSRF_AUTH_KEY=${CSRF_AUTH_KEY}
    depends_on:
      - insighta-backend
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.insighta-web.rule=Host(`insighta.app`)"
      - "traefik.http.routers.insighta-web.entrypoints=websecure"
      - "traefik.http.routers.insighta-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.insighta-web.loadbalancer.server.port=3000"

volumes:
  pgdata:
  insighta-db:

networks:
  web:
    external: true
