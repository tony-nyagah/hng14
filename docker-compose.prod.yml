services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/traefik/traefik.yml:/traefik.yml:ro
      - /root/traefik/acme.json:/letsencrypt/acme.json
    networks:
      - web

  backend-stage-0:
    image: ghcr.io/tony-nyagah/hng14/backend/backend-stage-0:latest
    restart: unless-stopped
    environment:
      - PORT=8059
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stage-0.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/api/classify`)"
      - "traefik.http.routers.stage-0.entrypoints=websecure"
      - "traefik.http.routers.stage-0.tls.certresolver=letsencrypt"
      - "traefik.http.services.stage-0.loadbalancer.server.port=8059"

  backend-stage-2:
    build: ./backend/stage-2
    restart: unless-stopped
    environment:
      - PORT=8070
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-hng14_stage2}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stage-2.rule=Host(`hng14.nyagah.me`) && PathPrefix(`/api/profiles`)"
      - "traefik.http.routers.stage-2.entrypoints=websecure"
      - "traefik.http.routers.stage-2.tls.certresolver=letsencrypt"
      - "traefik.http.services.stage-2.loadbalancer.server.port=8070"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: "${DB_NAME:-hng14_stage2}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

volumes:
  pgdata:

networks:
  web:
    external: true
